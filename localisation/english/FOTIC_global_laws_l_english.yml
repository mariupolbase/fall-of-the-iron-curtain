 fotic_economic_model_command_economy:0 "Command Economy"
 fotic_economic_model_command_economy_desc:0 "Rigid central planning. Controllable and stable, but inefficient and prone to shortages."
 fotic_economic_model_limited_khozraschyot:0 "Limited Khozraschyot"
