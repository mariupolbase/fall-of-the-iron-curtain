 fotic_social_policy_minimal_social_state:0 "Minimal Social State"
 fotic_social_policy_minimal_social_state_desc:0 "The state reduces social functions to a minimum."
 fotic_security_policy_administrative_control:0 "Administrative Control"
 fotic_security_policy_administrative_control_desc:0 "The state tightly controls public life."
 fotic_security_policy_restricted_public_space:0 "Restricted Public Space"
 fotic_security_policy_restricted_public_space_desc:0 "Controlled but not total public activity."
 fotic_security_policy_liberalised_public_space:0 "Liberalised Public Space"
 fotic_security_policy_liberalised_public_space_desc:0 "Freedom of assembly and public activity."
 fotic_security_policy_emergency_security_measures:0 "Emergency Security Measures"
 fotic_security_policy_emergency_security_measures_desc:0 "Heightened security with expanded powers for the security services."
