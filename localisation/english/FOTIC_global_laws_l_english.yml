 fotic_economic_model_regulated_mixed_economy:0 "Regulated Mixed Economy"
 fotic_economic_model_regulated_mixed_economy_desc:0 "A mix of state and market sectors under state control."
 fotic_economic_model_market_liberalisation:0 "Market Liberalisation"
 fotic_economic_model_market_liberalisation_desc:0 "A move to the market. More flexible, but hits stability and state control."
 fotic_economic_model_state_capitalism:0 "State Capitalism"
 fotic_economic_model_state_capitalism_desc:0 "Markets under firm state direction."
 fotic_social_policy_universal_state_welfare:0 "Universal State Welfare"
 fotic_social_policy_universal_state_welfare_desc:0 "The state guarantees broad social benefits. Stability at a budgetary cost."
 fotic_social_policy_reduced_state_welfare:0 "Reduced State Welfare"
 fotic_social_policy_reduced_state_welfare_desc:0 "Cutting the state's social obligations."
 fotic_social_policy_targeted_social_support:0 "Targeted Social Support"
