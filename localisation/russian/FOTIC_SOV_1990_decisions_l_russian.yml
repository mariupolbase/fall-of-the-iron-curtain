 SOV_1990_inspect_food_stocks:0 "Инспектировать продовольственные склады"
 SOV_1990_inspect_food_stocks_desc:0 "Направить комиссию для проверки реальных запасов. Расхождение с отчётами может оказаться значительным."
 SOV_1990_redirect_supplies_to_moscow:0 "Перенаправить снабжение в Москву"
 SOV_1990_redirect_supplies_to_moscow_desc:0 "Приоритет столице за счёт регионов. Москва должна быть спокойной."
 SOV_1990_expand_rationing:0 "Расширить карточную систему"
 SOV_1990_expand_rationing_desc:0 "Введение карточек на большее число товаров упорядочит распределение."
 SOV_1990_allow_cooperative_supply:0 "Разрешить кооперативное снабжение"
 SOV_1990_allow_cooperative_supply_desc:0 "Частные кооперативы заполняют пустые прилавки. Теневой рынок неизбежно вырастет."
 SOV_1990_crack_down_speculators:0 "Облава на спекулянтов"
 SOV_1990_crack_down_speculators_desc:0 "КГБ и МВД проводят совместные рейды против чёрного рынка."

 SOV_1990_rally_the_apparat:0 "Собрать аппарат"
 SOV_1990_rally_the_apparat_desc:0 "Совещание с ключевыми чиновниками для восстановления партийной дисциплины."
 SOV_1990_appease_conservatives:0 "Умиротворить консерваторов"
 SOV_1990_appease_conservatives_desc:0 "Уступки консервативному крылу снижают риск открытого заговора."
 SOV_1990_support_yakovlev:0 "Поддержать Яковлева"
 SOV_1990_support_yakovlev_desc:0 "Публичная поддержка главного архитектора гласности."

 SOV_1990_order_kgb_republic_report:0 "Заказать доклад КГБ по республикам"
 SOV_1990_order_kgb_republic_report_desc:0 "Актуальная разведывательная оценка ситуации в союзных республиках."
 SOV_1990_meet_yazov:0 "Встреча с Язовым"
 SOV_1990_meet_yazov_desc:0 "Министр обороны докладывает о состоянии лояльности армии."
 SOV_1990_mvd_reinforcements:0 "Усилить МВД"
 SOV_1990_mvd_reinforcements_desc:0 "Дополнительные силы для разгона несанкционированных демонстраций."

 SOV_1990_negotiate_lithuania:0 "Переговоры с Литвой"
 SOV_1990_negotiate_lithuania_desc:0 "Прямые контакты с литовским руководством для поиска компромисса."
 SOV_1990_economic_pressure_lithuania:0 "Экономическое давление на Литву"
 SOV_1990_economic_pressure_lithuania_desc:0 "Ограничение поставок энергоресурсов как инструмент принуждения."

 SOV_1990_meet_miners:0 "Встреча с шахтёрами"
 SOV_1990_meet_miners_desc:0 "Личные переговоры с представителями бастующих шахтёров Кузбасса и Донбасса."
 SOV_1990_talks_with_russia:0 "Переговоры с Россией"
 SOV_1990_talks_with_russia_desc:0 "Ельцин требует признания государственного суверенитета Российской Федерации."

 SOV_1990_appease_yeltsin:0 "Умиротворить Ельцина"
 SOV_1990_appease_yeltsin_desc:0 "Уступки России снижают угрозу двоевластия и ускоряют переговоры по Союзному договору."
 SOV_1990_pressure_yeltsin:0 "Давление на Ельцина"
 SOV_1990_pressure_yeltsin_desc:0 "Жёсткий курс против российского сепаратизма. Ставка на силу."
 SOV_1990_support_rsfsr_moderates:0 "Поддержать умеренных в РСФСР"
 SOV_1990_support_rsfsr_moderates_desc:0 "Дать компромиссным силам в российском парламенте ресурс против радикального суверенитета. Дорого по политической власти."
 SOV_1990_limit_yeltsin_airtime:0 "Ограничить эфир Ельцину"
 SOV_1990_limit_yeltsin_airtime_desc:0 "Сократить телевизионное время российского руководства. Снижает вызов, но злит реформаторов и прессу."
 SOV_1990_offer_russia_special_status:0 "Предложить России особый статус"
 SOV_1990_offer_russia_special_status_desc:0 "Признать особую роль РСФСР в обновлённом Союзе. Двигает Союзный договор, но раздражает консерваторов."
 SOV_1990_bind_russia_to_union_treaty:0 "Привязать Россию к договору"
 SOV_1990_bind_russia_to_union_treaty_desc:0 "Закрепить участие России в новом Союзном договоре. Требует уже наработанного прогресса договора."
 SOV_1990_rsfsr_sovereignty_timer:0 "Суверенитет РСФСР"
 SOV_1990_rsfsr_sovereignty_timer_desc:0 "После декларации суверенитета РСФСР у Центра есть время отреагировать. Если игнорировать — российский вызов резко вырастет."
