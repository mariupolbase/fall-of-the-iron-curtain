  FOTIC_SOV_1990.211.b:0 "Демонтажировать"
  FOTIC_SOV_1990.212.t:0 "Памятник Дзержинскому"
  FOTIC_SOV_1990.212.d:0 "Памятник  Дзержинскому в центре города стал предметом споров. Часть жителей считает его символом репрессий, другая часть видит в нём память о борьбе с преступностью. Власти не знают, как реагировать на эту новую точку напряжения."
