  фотик_сов_1990.214.t:0 "Памятник Горбачёву"
  FOTIC_SOV_1990.214.d:0 "Памятник Горбачёву в центре города стал местом для митингов и пикетов. Часть людей требует его сохранить, другая часть считает, что он уже не нужен. Власти не знают, как реагировать на эту новую точку напряжения."
