l_russian:
 FOTIC_SOV_1990.2.t:0 "Первое утро 1990 года"
 FOTIC_SOV_1990.2.d:0 "В Кремле год начинается с папок. Снабжение, республики, армия, КГБ, партия. На каждой папке аккуратная машинописная шапка. Внутри лежат цифры, которые не сходятся друг с другом."
 FOTIC_SOV_1990.2.a:0 "Начать с хозяйственных отчётов"
 FOTIC_SOV_1990.2.b:0 "Сначала политическая реформа"
 FOTIC_SOV_1990.2.c:0 "Пусть КГБ даст полную картину"
 FOTIC_SOV_1990.2.e:0 "Армия должна оставаться спокойной"
 FOTIC_SOV_1990.10.t:0 "Несоответствие на складах"
 FOTIC_SOV_1990.10.d:0 "Комиссия сравнила складские журналы с фактическими остатками. Часть продовольствия существует только в отчётах. Теперь нужно решить, искать виновных или молча пересчитать резервы."
 FOTIC_SOV_1990.10.a:0 "КГБ расследует снабженцев"
 FOTIC_SOV_1990.10.b:0 "Принять к сведению и двигаться дальше"
 FOTIC_SOV_1990.10.c:0 "Засекретить данные"
 FOTIC_SOV_1990.11.t:0 "Очередь у гастронома"
 FOTIC_SOV_1990.11.d:0 "Перераспределение снабжения в столицу дало результат, но регионы это заметили. У гастрономов выстроились очереди с ночи. Местные власти требуют указаний."
 FOTIC_SOV_1990.11.a:0 "Отправить дополнительные товары"
 FOTIC_SOV_1990.11.b:0 "Обвинить местных распределителей"
 FOTIC_SOV_1990.11.c:0 "Усилить милицейское дежурство"
 FOTIC_SOV_1990.11.e:0 "Ничего не предпринимать"
 FOTIC_SOV_1990.12.t:0 "Закрытый распределитель"
 FOTIC_SOV_1990.12.d:0 "Журналисты выяснили: в двух кварталах от пустых магазинов работает закрытый распределитель для номенклатуры. Статья выйдет через двое суток."
 FOTIC_SOV_1990.12.a:0 "Закрыть распределитель публично"
 FOTIC_SOV_1990.12.b:0 "Оставить как есть. Аппарату нужен распределитель"
 FOTIC_SOV_1990.12.c:0 "Перевести часть товаров в открытую продажу"
 FOTIC_SOV_1990.12.e:0 "КГБ заблокирует статью"
 FOTIC_SOV_1990.13.t:0 "Кооператор предлагает поставку"
 FOTIC_SOV_1990.13.d:0 "Московский кооператив предлагает закрыть часть дефицита: мясо, сахар и масло. Цена выше государственной. В трёх областях такая схема уже работает без разрешения центра."
 FOTIC_SOV_1990.13.a:0 "Разрешить поставки"
 FOTIC_SOV_1990.13.b:0 "Разрешить, но под контролем КГБ"
 FOTIC_SOV_1990.13.c:0 "Запретить. Распределением занимается государство"
 FOTIC_SOV_1990.13.e:0 "Передать через местный исполком"
 FOTIC_SOV_1990.14.t:0 "Директор меняет металл на мясо"
 FOTIC_SOV_1990.14.d:0 "Директор Свердловского металлургического завода наладил прямой бартер с агрокомплексом Воронежской области. Официально этой сделки не существует. Но рабочих накормили."
 FOTIC_SOV_1990.14.a:0 "Узаконить временный межзаводской бартер"
 FOTIC_SOV_1990.14.b:0 "Наказать директора за самоуправство"
 FOTIC_SOV_1990.14.c:0 "Использовать как рабочую модель"
 FOTIC_SOV_1990.14.e:0 "Отправить комиссию разобраться"
 FOTIC_SOV_1990.20.t:0 "Президентский вопрос"
 FOTIC_SOV_1990.20.d:0 "Третий Съезд народных депутатов СССР рассматривает учреждение поста Президента СССР. В партии понимают, что часть полномочий уйдёт от КПСС к новой государственной должности. Реформаторы ждут решения."
 FOTIC_SOV_1990.20.a:0 "Использовать президентство для реформ"
 FOTIC_SOV_1990.20.b:0 "Собрать управление вокруг президентства"
 FOTIC_SOV_1990.20.c:0 "Успокоить партийный актив"
 FOTIC_SOV_1990.20.e:0 "Отложить острые вопросы"
 FOTIC_SOV_1990.21.t:0 "Новая редакция шестой статьи"
 FOTIC_SOV_1990.21.d:0 "Конституционная поправка убирает из шестой статьи положение о руководящей роли КПСС. Партия сохраняет аппарат и влияние, но больше не может ссылаться на монополию, закреплённую в Основном законе. На местах уже спрашивают, кто теперь отвечает за исполнение решений."
 FOTIC_SOV_1990.21.a:0 "Принять политический плюрализм как данность"
 FOTIC_SOV_1990.21.b:0 "Ограничить регистрацию новых партий процедурами"
 FOTIC_SOV_1990.21.c:0 "Сохранить влияние КПСС через аппарат"
 FOTIC_SOV_1990.21.e:0 "Дать консерваторам публичные гарантии"
 FOTIC_SOV_1990.22.t:0 "Обком просит ясности"
 FOTIC_SOV_1990.22.d:0 "Первые секретари обкомов прислали совместную докладную. Реформы идут быстрее, чем аппарат успевает перестраиваться. Они просят либо обозначить пределы изменений, либо дать местным органам больше времени и полномочий."
 FOTIC_SOV_1990.22.a:0 "Подтвердить руководящую роль партии на местах"
 FOTIC_SOV_1990.22.b:0 "Требовать от обкомов поддержки реформ"
 FOTIC_SOV_1990.22.c:0 "Разрешить местный манёвр в пределах курса"
 FOTIC_SOV_1990.22.e:0 "Заменить наиболее упрямых первых секретарей"
 FOTIC_SOV_1990.23.t:0 "Яковлев требует продолжения гласности"
 FOTIC_SOV_1990.23.d:0 "На закрытом совещании Александр Яковлев требует не сворачивать гласность. По его мнению, новые запреты будут восприняты как откат, а аппарат всё равно не успеет вернуть прежний контроль."
 FOTIC_SOV_1990.23.a:0 "Поддержать Яковлева публично"
 FOTIC_SOV_1990.23.b:0 "Ограничить наиболее острые темы"
 FOTIC_SOV_1990.23.c:0 "Передать вопрос профильной комиссии"
 FOTIC_SOV_1990.23.e:0 "КГБ получает право мониторинга редакций"
 FOTIC_SOV_1990.24.t:0 "Консерваторы говорят о развале"
 FOTIC_SOV_1990.24.d:0 "На закрытом совещании группа членов Политбюро заявила, что реформы зашли слишком далеко. Они требуют остановить часть изменений и вернуть аппарату прежние полномочия."
 FOTIC_SOV_1990.24.a:0 "Успокоить и дать умеренные гарантии"
 FOTIC_SOV_1990.24.b:0 "Не поддаваться на давление"
 FOTIC_SOV_1990.24.c:0 "Дать консерваторам ключевые посты"
 FOTIC_SOV_1990.24.e:0 "Вынести вопрос на открытую дискуссию"
 FOTIC_SOV_1990.30.t:0 "Докладная Крючкова"
 FOTIC_SOV_1990.30.d:0 "Председатель КГБ Крючков принёс папку с грифом. В ней сводка по народным фронтам Прибалтики, Молдавии и Грузии. Их организованность выше, чем сообщали местные органы."
 FOTIC_SOV_1990.30.a:0 "Санкционировать плотное наблюдение"
 FOTIC_SOV_1990.30.b:0 "Санкционировать активные мероприятия"
 FOTIC_SOV_1990.30.c:0 "Передать копии в Совет Министров"
 FOTIC_SOV_1990.30.e:0 "Принять к сведению и закрыть папку"
 FOTIC_SOV_1990.31.t:0 "Язов требует правил"
 FOTIC_SOV_1990.31.d:0 "Министр обороны Язов поставил вопрос жёстко: армия не понимает своей роли во внутренних кризисах. Если завтра попросят вывести части, что говорить офицерам?"
 FOTIC_SOV_1990.31.a:0 "Охранять объекты, не вмешиваться в политику"
 FOTIC_SOV_1990.31.b:0 "Армия готовится к возможным внутренним операциям"
 FOTIC_SOV_1990.31.c:0 "Передать внутренние вопросы МВД"
 FOTIC_SOV_1990.31.e:0 "Создать межведомственный оперативный штаб"
 FOTIC_SOV_1990.32.t:0 "МВД просит полномочия"
 FOTIC_SOV_1990.32.d:0 "Министерство внутренних дел запрашивает расширение прав на разгон несанкционированных собраний и временное задержание организаторов беспорядков."
 FOTIC_SOV_1990.32.a:0 "Дать запрошенные полномочия"
 FOTIC_SOV_1990.32.b:0 "Ограниченные полномочия в рамках существующего закона"
 FOTIC_SOV_1990.32.c:0 "Передать оперативные функции КГБ"
 FOTIC_SOV_1990.32.e:0 "Создать межведомственную комиссию"
 FOTIC_SOV_1990.33.t:0 "Военный городок без снабжения"
 FOTIC_SOV_1990.33.d:0 "Доклад от командования Приволжского округа: продовольственное снабжение гарнизонов по ряду позиций ниже норматива. Офицерские семьи в той же очереди, что и гражданские."
 FOTIC_SOV_1990.33.a:0 "Приоритет военным гарнизонам"
 FOTIC_SOV_1990.33.b:0 "Равное снабжение с гражданским населением"
 FOTIC_SOV_1990.33.c:0 "Скрыть проблему от открытой прессы"
 FOTIC_SOV_1990.33.e:0 "Наказать местных снабженцев"
 FOTIC_SOV_1990.40.t:0 "Литва объявляет независимость"
 FOTIC_SOV_1990.40.d:0 "11 марта 1990 года Верховный Совет Литвы принял акт о восстановлении независимого государства. Москва считает его противоречащим Конституции СССР. В других республиках внимательно следят за ответом центра."
 FOTIC_SOV_1990.40.a:0 "Не признать и начать экономическое давление"
 FOTIC_SOV_1990.40.b:0 "Начать прямые переговоры"
 FOTIC_SOV_1990.40.c:0 "Подготовить вариант силового ответа"
 FOTIC_SOV_1990.40.e:0 "Юридически заблокировать через Верховный Совет СССР"
 FOTIC_SOV_1990.41.t:0 "Экономическое давление на Литву"
 FOTIC_SOV_1990.41.d:0 "Поставки нефти и газа в Литву ограничены. Вильнюс ещё держится, но промышленность уже начинает ощущать нехватку. Запад наблюдает и формулирует протесты."
 FOTIC_SOV_1990.41.a:0 "Продолжать давление"
 FOTIC_SOV_1990.41.b:0 "Смягчить ограничения"
 FOTIC_SOV_1990.41.c:0 "Усилить ещё больше"
 FOTIC_SOV_1990.41.e:0 "Перевести в режим переговоров"
 FOTIC_SOV_1990.42.t:0 "Латвия и Эстония смотрят на Вильнюс"
 FOTIC_SOV_1990.42.d:0 "Верховные Советы Латвии и Эстонии приняли решения о переходном периоде к восстановлению независимости. Это ещё не окончательный разрыв, но направление ясно."
 FOTIC_SOV_1990.42.a:0 "КГБ усиливает работу в республиках"
 FOTIC_SOV_1990.42.b:0 "Предложить прямые переговоры"
 FOTIC_SOV_1990.42.c:0 "Укрепить партийные структуры в республиках"
 FOTIC_SOV_1990.42.e:0 "Активные мероприятия против националистов"
 FOTIC_SOV_1990.43.t:0 "Балтийские кадры не отвечают Москве"
 FOTIC_SOV_1990.43.d:0 "Несколько директивных запросов из Москвы остались без ответа в установленные сроки. Местные руководители ссылаются на решения своих верховных советов."
 FOTIC_SOV_1990.43.a:0 "Заменить несогласных руководителей"
 FOTIC_SOV_1990.43.b:0 "Искать компромиссных руководителей"
 FOTIC_SOV_1990.43.c:0 "Дать понять, что КГБ следит"
 FOTIC_SOV_1990.43.e:0 "Признать де-факто местную специфику"
 FOTIC_SOV_1990.50.t:0 "Российский съезд"
 FOTIC_SOV_1990.50.d:0 "Открывается Первый Съезд народных депутатов РСФСР. Ельцин выступает с простым тезисом: РСФСР должна быть полноправным участником Союза, а не территорией, которой распоряжается центр. В зале его поддерживают многие депутаты."
 FOTIC_SOV_1990.50.a:0 "Не вмешиваться"
 FOTIC_SOV_1990.50.b:0 "Поддержать умеренных депутатов"
 FOTIC_SOV_1990.50.c:0 "Дискредитировать Ельцина через партийные каналы"
 FOTIC_SOV_1990.50.e:0 "Предложить особый экономический договор с РСФСР"
 FOTIC_SOV_1990.51.t:0 "Декларация суверенитета РСФСР"
 FOTIC_SOV_1990.51.d:0 "12 июня 1990 года Съезд народных депутатов РСФСР принял Декларацию о государственном суверенитете. В документе закреплён приоритет российских законов над союзными. Ельцин, избранный председателем Верховного Совета РСФСР в конце мая, получает сильную политическую опору."
 FOTIC_SOV_1990.51.a:0 "Оспорить юридически через союзные структуры"
 FOTIC_SOV_1990.51.b:0 "Признать как политический жест, не как факт"
 FOTIC_SOV_1990.51.c:0 "Начать прямые переговоры о разграничении полномочий"
 FOTIC_SOV_1990.51.e:0 "Использовать партию против радикалов в РСФСР"
 FOTIC_SOV_1990.52.t:0 "Война законов"
 FOTIC_SOV_1990.52.d:0 "Союзные и российские органы выпускают противоречащие друг другу акты. На местах не понимают, каким распоряжениям следовать и какой закон применять."
 FOTIC_SOV_1990.52.a:0 "Союзный закон имеет абсолютный приоритет"
 FOTIC_SOV_1990.52.b:0 "Искать правовой компромисс"
 FOTIC_SOV_1990.52.c:0 "Передать в Конституционный комитет"
 FOTIC_SOV_1990.52.e:0 "Давить через партийный аппарат"
 FOTIC_SOV_1990.53.t:0 "Ельцин выступает перед шахтёрами"
 FOTIC_SOV_1990.53.d:0 "Ельцин снова выступил, теперь перед шахтёрами. Он говорит просто: центр проваливает снабжение, а РСФСР справится лучше сама. Выступление быстро расходится по стране."
 FOTIC_SOV_1990.53.a:0 "Не отвечать публично"
 FOTIC_SOV_1990.53.b:0 "Оспорить его цифры в прессе"
 FOTIC_SOV_1990.53.c:0 "КГБ ограничивает эфир для оппозиции"
 FOTIC_SOV_1990.53.e:0 "Предложить закрытые переговоры"
 FOTIC_SOV_1990.60.t:0 "Украина принимает декларацию суверенитета"
 FOTIC_SOV_1990.60.d:0 "16 июля 1990 года Верховный Совет Украинской ССР принял Декларацию о государственном суверенитете. В ней говорится о верховенстве республиканских законов и экономической самостоятельности. На переговорах о Союзном договоре Киев теперь будет говорить с другой позиции."
 FOTIC_SOV_1990.60.a:0 "Предложить экономические гарантии Украине"
 FOTIC_SOV_1990.60.b:0 "Торговаться о разграничении полномочий"
 FOTIC_SOV_1990.60.c:0 "Давить через партийные структуры Украины"
 FOTIC_SOV_1990.60.e:0 "Отложить вопрос до переговоров по Союзному договору"
 FOTIC_SOV_1990.61.t:0 "Республики спрашивают о собственности"
 FOTIC_SOV_1990.61.d:0 "После украинской декларации несколько республик официально запросили разъяснений: кому принадлежат природные ресурсы и промышленные объекты на их территории?"
 FOTIC_SOV_1990.61.a:0 "Сохранить союзную собственность"
 FOTIC_SOV_1990.61.b:0 "Начать инвентаризацию и переговоры"
 FOTIC_SOV_1990.61.c:0 "Передать часть полномочий республикам"
 FOTIC_SOV_1990.61.e:0 "Отложить до принятия нового Союзного договора"
 FOTIC_SOV_1990.62.t:0 "Казахстан требует гарантий"
 FOTIC_SOV_1990.62.d:0 "Назарбаев принёс список требований: расширенные экономические полномочия, контроль над республиканскими ресурсами и особый статус в Союзном договоре. В обмен он обещает поддержать единый Союз."
 FOTIC_SOV_1990.62.a:0 "Принять условия Казахстана"
 FOTIC_SOV_1990.62.b:0 "Торговаться по каждому пункту"
 FOTIC_SOV_1990.62.c:0 "Связать гарантии с Байконуром и углём"
 FOTIC_SOV_1990.62.e:0 "Отложить разговор"
 FOTIC_SOV_1990.63.t:0 "Кавказская сводка"
 FOTIC_SOV_1990.63.d:0 "КГБ докладывает о продолжающихся столкновениях в Нагорном Карабахе. В Грузии растут требования суверенитета. Из Баку и Еревана приходят взаимоисключающие просьбы."
 FOTIC_SOV_1990.63.a:0 "МВД получает приоритет на Кавказе"
 FOTIC_SOV_1990.63.b:0 "Начать прямые переговоры с лидерами республик"
 FOTIC_SOV_1990.63.c:0 "КГБ занимается Кавказом"
 FOTIC_SOV_1990.63.e:0 "Армия приводится в боевую готовность"
 FOTIC_SOV_1990.70.t:0 "Шахтёры требуют ответа"
 FOTIC_SOV_1990.70.d:0 "Стачкомы Кузбасса и Донбасса выдвинули требования: наладить снабжение шахт, признать независимость профсоюзов и расширить экономические права предприятий. Срок на ответ: неделя."
 FOTIC_SOV_1990.70.a:0 "Предложить снабжение и экономические права"
 FOTIC_SOV_1990.70.b:0 "Создать правительственную комиссию"
 FOTIC_SOV_1990.70.c:0 "Расколоть стачком через умеренных"
 FOTIC_SOV_1990.70.e:0 "Дать понять: армия готова"
 FOTIC_SOV_1990.71.t:0 "Газета печатает лишнее"
 FOTIC_SOV_1990.71.d:0 "Московское издание опубликовало данные о реальном уровне снабжения в сравнении с официальной статистикой. Разница очевидна. Тираж разобрали за час."
 FOTIC_SOV_1990.71.a:0 "Не вмешиваться. Это гласность"
 FOTIC_SOV_1990.71.b:0 "Вызвать редактора и предупредить"
 FOTIC_SOV_1990.71.c:0 "Закрыть номер, изъять тираж"
 FOTIC_SOV_1990.71.e:0 "Использовать скандал против хозяйственного аппарата"
 FOTIC_SOV_1990.72.t:0 "Митинг у здания обкома"
 FOTIC_SOV_1990.72.d:0 "У здания областного комитета партии собралось несколько тысяч человек. Требования: ответ по снабжению, отставка первого секретаря, публичный отчёт."
 FOTIC_SOV_1990.72.a:0 "Выйти к людям"
 FOTIC_SOV_1990.72.b:0 "МВД разгоняет митинг"
 FOTIC_SOV_1990.72.c:0 "Пообещать конкретные уступки"
 FOTIC_SOV_1990.72.e:0 "Не реагировать"
 FOTIC_SOV_1990.73.t:0 "Анекдот дошёл до кабинета"
 FOTIC_SOV_1990.73.d:0 "Референт принёс свежий анекдот про очередь, Горбачёва и колбасу по два двадцать. Смешно. Но этот же анекдот рассказывают у станков, на лавочках и в офицерских собраниях."
 FOTIC_SOV_1990.73.a:0 "Пусть говорят. Это снижает напряжение"
 FOTIC_SOV_1990.73.b:0 "КГБ фиксирует настроения"
 FOTIC_SOV_1990.73.c:0 "Надо завезти колбасу"
 FOTIC_SOV_1990.90.t:0 "Итоги 1990 года"
 FOTIC_SOV_1990.90.d:0 "Год заканчивается. СССР сохранился, но январская уверенность ушла. Горбачёв стал президентом, однако новая должность не заменила прежние рычаги партии. Литва заявила о восстановлении независимости. РСФСР и Украинская ССР приняли декларации о суверенитете. Шахтёрские стачкомы научились добиваться ответа из Москвы."
 FOTIC_SOV_1990.90.a:0 "Принять итоги и готовиться к 1991"
 FOTIC_SOV_1990.100.a:0 "Продолжать"
 FOTIC_SOV_1990.1.a:0 "..."
 FOTIC_SOV_1990.151.t:0 "Прямой разговор"
 FOTIC_SOV_1990.151.d:0 "Российское руководство обращается к людям напрямую, минуя союзный аппарат. Простые слова работают лучше съездовских формулировок."
 FOTIC_SOV_1990.151.a:0 "Не реагировать"
 FOTIC_SOV_1990.151.b:0 "Ответить в союзных СМИ"
 FOTIC_SOV_1990.151.c:0 "Перехватить повестку"
 FOTIC_SOV_1990.153.t:0 "Москва спорит с Москвой"
 FOTIC_SOV_1990.153.d:0 "В одном городе теперь две власти, и каждая считает себя законной. Аппарат не понимает, чьи распоряжения выполнять."
 FOTIC_SOV_1990.153.a:0 "Настаивать на союзной вертикали"
 FOTIC_SOV_1990.153.b:0 "Дать КГБ свободу рук"
 FOTIC_SOV_1990.154.t:0 "Умеренные просят поддержки"
 FOTIC_SOV_1990.154.d:0 "Компромиссные депутаты РСФСР готовы сдерживать наиболее радикальные требования, но им нужны ресурсы и политическая поддержка из центра."
 FOTIC_SOV_1990.154.a:0 "Поддержать умеренных"
 FOTIC_SOV_1990.154.b:0 "Остаться в стороне"
 FOTIC_SOV_1990.155.t:0 "Эфир для Ельцина"
 FOTIC_SOV_1990.155.d:0 "Телевизионное время стало политическим вопросом. Если дать Ельцину слово, он усилит свои позиции. Если ограничить эфир, он представит это как цензуру."
 FOTIC_SOV_1990.155.a:0 "Ограничить эфир"
 FOTIC_SOV_1990.155.b:0 "Оставить как есть"
 FOTIC_SOV_1990.156.t:0 "Союзный закон против российского"
 FOTIC_SOV_1990.156.d:0 "Российский парламент принимает законы, прямо противоречащие союзным. Война законов перестала быть теорией."
 FOTIC_SOV_1990.156.a:0 "Объявить российские акты ничтожными"
 FOTIC_SOV_1990.156.b:0 "Искать юридический компромисс"
 FOTIC_SOV_1990.157.t:0 "Российский вопрос не закрыт"
 FOTIC_SOV_1990.157.d:0 "1990 год заканчивается, а спор между союзным центром и руководством РСФСР так и не решён. В новый год обе стороны входят с собственными законами, аппаратами и претензиями."
 FOTIC_SOV_1990.157.a:0 "Принять к сведению"
 FOTIC_SOV_1990.64.t:0 "Союзный договор буксует"
 FOTIC_SOV_1990.64.d:0 "Проект нового Союзного договора вязнет в согласованиях. Каждая республика правит формулировки под себя. Текст становится длиннее, а согласия больше не становится."
 FOTIC_SOV_1990.64.a:0 "Давить на подписание"
 FOTIC_SOV_1990.64.b:0 "Принять задержку"
 FOTIC_SOV_1990.65.t:0 "Республиканские юристы считают полномочия"
 FOTIC_SOV_1990.65.d:0 "Юридические отделы республик составляют перечни того, что должно перейти под их контроль: заводы, земля, налоги, склады. Вопрос уже не о флагах, а о собственности."
 FOTIC_SOV_1990.65.a:0 "Создать союзную комиссию по разграничению"
 FOTIC_SOV_1990.65.b:0 "Отложить вопрос собственности"
 FOTIC_SOV_1990.170.t:0 "Шахтёрская телеграмма"
 FOTIC_SOV_1990.170.d:0 "Из Кузбасса и Воркуты приходят согласованные требования: зарплаты, поставки, отставки местного начальства. Стачкомы научились говорить одним голосом."
 FOTIC_SOV_1990.170.a:0 "Послать комиссию и обещать поставки"
 FOTIC_SOV_1990.170.b:0 "Тянуть время"
 FOTIC_SOV_1990.175.t:0 "Телевидение показывает очередь"
 FOTIC_SOV_1990.175.d:0 "В вечернем эфире показывают не сводку надоев, а очередь у пустого гастронома и злой комментарий. Такая картинка расходится по стране быстрее любой газеты."
 FOTIC_SOV_1990.175.a:0 "Не вмешиваться в эфир"
 FOTIC_SOV_1990.175.b:0 "Напомнить редакции о согласовании"
 FOTIC_SOV_1990.176.t:0 "Милиция просит приказ"
 FOTIC_SOV_1990.176.d:0 "На площади проходит несанкционированный митинг. МВД ждёт письменного приказа: разгонять людей или стоять в стороне. Никто не хочет брать ответственность на себя."
 FOTIC_SOV_1990.176.a:0 "Дать приказ очистить площадь"
 FOTIC_SOV_1990.176.b:0 "Приказ не давать"
 FOTIC_SOV_1990.179.t:0 "После митинга"
 FOTIC_SOV_1990.179.d:0 "После митинга по области расходятся слухи о действиях милиции и ответе властей. Для одних центр проявил твёрдость. Для других показал, что не слышит людей."
 FOTIC_SOV_1990.179.a:0 "Принять к сведению"
 FOTIC_SOV_1990.34.t:0 "Пустые склады в гарнизоне"
 FOTIC_SOV_1990.34.d:0 "Из округа докладывают: в военном городке нет ни мяса, ни топлива. Офицерские семьи стоят в тех же очередях, что и все. Язов спрашивает не о политике, а о поставках."
 FOTIC_SOV_1990.34.a:0 "Перебросить снабжение армии"
 FOTIC_SOV_1990.34.b:0 "Сейчас не до военных"
 FOTIC_SOV_1990.35.t:0 "Офицеры спорят о Прибалтике"
 FOTIC_SOV_1990.35.d:0 "В офицерских собраниях открыто обсуждают, что делать с Прибалтикой. Одни требуют приказа, другие не хотят стрелять в своих. Споры уже выходят за рамки служебных вопросов."
 FOTIC_SOV_1990.35.a:0 "Держать армию вне политики"
 FOTIC_SOV_1990.35.b:0 "Дать офицерам готовиться"
 FOTIC_SOV_1990.36.t:0 "Внутренние войска к объектам связи"
 FOTIC_SOV_1990.36.d:0 "Поступает предложение на всякий случай скрытно выдвинуть внутренние войска к телецентрам и узлам связи. Бумага лежит на столе и ждёт визы."
 FOTIC_SOV_1990.36.a:0 "Выдвинуть к объектам связи"
 FOTIC_SOV_1990.36.b:0 "Не трогать связь"
 FOTIC_SOV_1990.37.t:0 "Черновик чрезвычайного положения"
 FOTIC_SOV_1990.37.d:0 "В сейфе появляется черновик указа о чрезвычайном положении. Пока это только бумага. Но сам факт, что её написали и не порвали, многое говорит о настроениях аппарата."
 FOTIC_SOV_1990.37.a:0 "Сохранить черновик"
 FOTIC_SOV_1990.37.b:0 "Уничтожить черновик"

 FOTIC_SOV_1990.190.t:0 "Новая сводка из Карабаха"
 FOTIC_SOV_1990.190.d:0 "В Нагорном Карабахе опять стрельба, беженцы идут в обе стороны. Местные советы Москву не слышат, а армейские части используют для разъединения враждующих. Промедление стоит новых жертв."
 FOTIC_SOV_1990.190.a:0 "Ввести войска и комендантский час"
 FOTIC_SOV_1990.190.b:0 "Решать через республики, не армией"
 FOTIC_SOV_1990.190.c:0 "Не вмешиваться"
 FOTIC_SOV_1990.191.t:0 "Тбилиси помнит апрель"
 FOTIC_SOV_1990.191.d:0 "В Грузии любое движение войск напоминает о 9 апреля 1989 года: сапёрные лопатки, газ, погибшие у Дома правительства. Если техника выйдет на улицу, площадь быстро заполнится людьми."
 FOTIC_SOV_1990.191.a:0 "Гарантировать: войск на улицах не будет"
 FOTIC_SOV_1990.191.b:0 "Сохранить военное присутствие"
 FOTIC_SOV_1990.192.t:0 "Закавказье просит определённости"
 FOTIC_SOV_1990.192.d:0 "Республики Закавказья требуют ясного ответа: остаются ли они в Союзе и на каких условиях. Уклончивость толкает их договариваться между собой, минуя центр."
 FOTIC_SOV_1990.192.a:0 "Обещать особый статус и расширенные полномочия"
 FOTIC_SOV_1990.192.b:0 "Единый Союз без исключений"
 FOTIC_SOV_1990.200.t:0 "Талоны вместо денег"
 FOTIC_SOV_1990.200.d:0 "В области ввели талоны на сахар, табак и водку. Рубль у прилавка уже мало что значит. Теперь решают, расширять ли талонную систему дальше."
 FOTIC_SOV_1990.200.a:0 "Расширить талонную систему"
 FOTIC_SOV_1990.200.b:0 "Не плодить талоны"
 FOTIC_SOV_1990.201.t:0 "Свет по графику"
 FOTIC_SOV_1990.201.d:0 "Энергии на всех не хватает. Диспетчер спрашивает, кого отключать первыми: заводы или жилые кварталы."
 FOTIC_SOV_1990.201.a:0 "Сохранить снабжение заводов"
 FOTIC_SOV_1990.201.b:0 "Сохранить снабжение жилых кварталов"
 FOTIC_SOV_1990.202.t:0 "Кооперативный ларёк у метро"
 FOTIC_SOV_1990.202.d:0 "У метро встал кооперативный ларёк: там есть то, чего нет в гастрономе, но втрое дороже. Очередь стоит и туда. Райисполком ждёт указаний."
 FOTIC_SOV_1990.202.a:0 "Не мешать торговле"
 FOTIC_SOV_1990.202.b:0 "Прижать кооператоров"
 FOTIC_SOV_1990.203.t:0 "Слух из очереди"
 FOTIC_SOV_1990.203.d:0 "По очередям пошёл слух о скором повышении цен, и люди начали сметать с полок всё подряд, от спичек до соли. К вечеру магазины опустели."
 FOTIC_SOV_1990.203.a:0 "Опровергнуть слух по телевидению"
 FOTIC_SOV_1990.203.b:0 "Промолчать. Слух уляжется сам"
 FOTIC_SOV_1990.204.t:0 "Фарцовка у гостиницы"
 FOTIC_SOV_1990.204.d:0 "У интуристовской гостиницы открыто меняют валюту и торгуют импортом. Милиция смотрит сквозь пальцы: у многих там свой интерес."
 FOTIC_SOV_1990.204.a:0 "Облава вместе с КГБ"
 FOTIC_SOV_1990.204.b:0 "Закрыть глаза"
 FOTIC_SOV_1990.205.t:0 "Разнарядка сверху"
 FOTIC_SOV_1990.205.d:0 "Из центра спустили план, который на местах выполнить нечем. Можно отчитаться бумагой и сохранить лицо аппарата. Можно доложить как есть и испортить сводку."
 FOTIC_SOV_1990.205.a:0 "Выполнить на бумаге"
 FOTIC_SOV_1990.205.b:0 "Доложить как есть"
 FOTIC_SOV_1990.90.d_security:0 "Год заканчивается в тревожной обстановке. КГБ, армия и партийные консерваторы всё чаще говорят о чрезвычайных мерах. На столах появляются проекты указов и планы переброски частей. Пока это бумаги. Но их уже не убирают в корзину."
 FOTIC_SOV_1990.90.d_collapse:0 "Год заканчивается, а распоряжения центра всё чаще остаются без исполнения. Республики принимают собственные законы, местные органы тянут с ответами, аппарат работает неровно. Формально Союз сохраняется. На практике Москва уже не может быть уверена, что её услышат."
 FOTIC_SOV_1990.90.d_russia:0 "Год заканчивается, и в Москве работают два центра власти. Союзное и российское руководство спорят за полномочия, бюджеты и контроль над учреждениями. Ельцин обращается к людям напрямую и получает всё больше внимания. Этот спор не получится отложить надолго."
 FOTIC_SOV_1990.90.d_reform:0 "Год заканчивается, а реформы идут быстрее, чем меняется хозяйство. Гласность позволяет открыто говорить о дефиците, но магазины от этого не наполняются. Реформаторы сохраняют инициативу. Население всё чаще оценивает курс по ценам и очередям."
 FOTIC_SOV_1990.90.d_held:0 "Год заканчивается. Центр всё ещё отдаёт распоряжения, которые исполняют. Союзный договор буксует, республики торгуются, очереди никуда не делись. Но управляемость сохранена, и для 1990 года это уже результат."
 FOTIC_SOV_1990.80.t:0 "«Наступает диктатура»"
 FOTIC_SOV_1990.80.d:0 "20 декабря Шеварднадзе объявляет об отставке с трибуны Съезда народных депутатов СССР. Министр иностранных дел предупреждает об угрозе диктатуры и говорит, что реформаторы отступают. Зал слушает молча. Для Горбачёва это тяжёлый политический удар."
 FOTIC_SOV_1990.80.a:0 "Принять отставку"
 FOTIC_SOV_1990.80.b:0 "Уговорить остаться"
 FOTIC_SOV_1990.80.c:0 "Списать на интриги аппарата"
 FOTIC_SOV_1990.110.t:0 "Два плана на одном столе"
 FOTIC_SOV_1990.110.d:0 "На стол легли две экономические программы. «500 дней» Шаталина и Явлинского предлагают быстрый переход к рынку и широкую хозяйственную самостоятельность республик. Ельцин и руководство РСФСР поддерживают этот вариант. Программа Рыжкова и Абалкина осторожнее и сохраняет за государством больше рычагов."
 FOTIC_SOV_1990.110.a:0 "Принять программу «500 дней»"
 FOTIC_SOV_1990.110.b:0 "Поддержать программу правительства"
 FOTIC_SOV_1990.110.c:0 "Слить оба в «Основные направления»"
 FOTIC_SOV_1990.120.t:0 "XXVIII съезд КПСС"
 FOTIC_SOV_1990.120.d:0 "XXVIII съезд КПСС проходит уже после изменения шестой статьи Конституции. В партии открыто спорят о дальнейшем курсе. Реформаторы требуют продолжать преобразования, консервативное крыло во главе с Лигачёвым требует остановиться. На съезде решается не только вопрос о руководстве, но и то, какой останется сама партия."
 FOTIC_SOV_1990.120.a:0 "Опереться на реформаторское крыло"
 FOTIC_SOV_1990.120.b:0 "Сохранить единство аппарата"
 FOTIC_SOV_1990.120.c:0 "Лавировать между крыльями"
 FOTIC_SOV_1990.121.t:0 "Ельцин выходит из партии"
 FOTIC_SOV_1990.121.d:0 "Во время съезда Ельцин объявляет о выходе из КПСС и покидает зал. Его решение показывает, насколько далеко разошлись союзный партийный центр и руководство РСФСР."
 FOTIC_SOV_1990.121.a:0 "Принять его выход из партии"
 FOTIC_SOV_1990.121.b:0 "Назвать это предательством"
 FOTIC_SOV_1990.130.t:0 "Война в Заливе"
 FOTIC_SOV_1990.130.d:0 "Ирак занял Кувейт. США собирают международную коалицию, и Москве нужно определить свою позицию. Поддержка коалиции продолжит курс на сотрудничество с Западом. Поддержка Багдада испортит отношения, которые Горбачёв выстраивал последние годы. В Генштабе напоминают о старых связях с Ираком."
 FOTIC_SOV_1990.130.a:0 "Поддержать международную коалицию"
 FOTIC_SOV_1990.130.b:0 "Не ссориться с Багдадом"
 FOTIC_SOV_1990.130.c:0 "Не занимать жёсткую позицию"
 FOTIC_SOV_1990.131.t:0 "Объединение Германии"
 FOTIC_SOV_1990.131.d:0 "3 октября ГДР вошла в состав ФРГ. Москва согласилась на объединение Германии. За рубежом это называют успехом нового мышления. Дома часть офицеров и партийных консерваторов видит в соглашении уступку. Советские войска пока остаются в Германии, но прежнего положения уже нет."
 FOTIC_SOV_1990.131.a:0 "Защищать как победу нового мышления"
 FOTIC_SOV_1990.131.b:0 "Признать: мы отступаем в Европе"
 FOTIC_SOV_1990.132.t:0 "Нобелевская премия мира"
 FOTIC_SOV_1990.132.d:0 "Горбачёву присуждают Нобелевскую премию мира. За границей решение встречают с одобрением. Дома реакция сдержаннее: людям важнее очереди и талоны. В газетах награду будут обсуждать иначе, чем на кухнях."
 FOTIC_SOV_1990.132.a:0 "Принять как признание курса"
 FOTIC_SOV_1990.132.b:0 "Без лишнего триумфа"
 FOTIC_SOV_1990.140.t:0 "Парад суверенитетов"
 FOTIC_SOV_1990.140.d:0 "Вслед за РСФСР и Украинской ССР декларации принимают другие республики, среди них Белоруссия и Казахстан. Во многих документах повторяется один пункт: республиканские законы получают приоритет над союзными. Центру пора решить, как отвечать на этот процесс."
 FOTIC_SOV_1990.140.a:0 "Признать реальность, ускорить Союзный договор"
 FOTIC_SOV_1990.140.b:0 "Настаивать на верховенстве союзных законов"
 FOTIC_SOV_1990.140.c:0 "Тянуть время"
 FOTIC_SOV_1990.145.t:0 "Молдавия и Приднестровье"
 FOTIC_SOV_1990.145.d:0 "Кишинёв всё дальше уходит от союзного центра. В Приднестровье и Гагаузии этому сопротивляются и ждут поддержки Москвы. У Кремля нет решения, которое устроит всех."
 FOTIC_SOV_1990.145.a:0 "Поддержать Кишинёв ради единства республики"
 FOTIC_SOV_1990.145.b:0 "Опереться на Приднестровье"
 FOTIC_SOV_1990.145.c:0 "Не вмешиваться"
 FOTIC_SOV_1990.206.t:0 "Колокола возвращаются"
 FOTIC_SOV_1990.206.d:0 "По стране снова открывают храмы, крестят детей, возвращают приходам здания. После празднования тысячелетия крещения интерес к церкви уже не получается загнать обратно в частную жизнь. Часть аппарата относится к этому настороженно. Часть уже не скрывает собственного интереса к вере."
 FOTIC_SOV_1990.206.a:0 "Не мешать открытию храмов"
 FOTIC_SOV_1990.206.b:0 "Партии держаться настороже"
 FOTIC_SOV_1990.207.t:0 "Очереди в ОВИР"
 FOTIC_SOV_1990.207.d:0 "Выезд за границу становится проще, и очереди в ОВИР растут. Уезжают учёные, инженеры и целые семьи. Кто-то отправляется в Израиль, кто-то ищет контракт на Западе. Для многих институтов потеря нескольких специалистов уже становится проблемой."
 FOTIC_SOV_1990.207.a:0 "Выпускать свободно"
 FOTIC_SOV_1990.207.b:0 "Придержать ценные кадры"
 FOTIC_SOV_1990.208.t:0 "Рэкет на рынках"
 FOTIC_SOV_1990.208.d:0 "Кооператоры всё чаще платят рэкетирам. На рынках устанавливают свои правила, а в городах происходят перестрелки из-за мест и поставок. Милиция не справляется, а иногда просто не вмешивается. Люди спрашивают, куда смотрит власть."
 FOTIC_SOV_1990.208.a:0 "Дать МВД больше полномочий"
 FOTIC_SOV_1990.208.b:0 "Сейчас не до того"
 FOTIC_SOV_1990.209.t:0 "Экология выходит на площадь"
 FOTIC_SOV_1990.209.d:0 "После Чернобыля экологические требования всё чаще становятся политическими. В Белоруссии и на Украине требуют закрыть вредные производства, на митинги выходят матери с детьми. Завод кормит область, но загрязнение касается всех."
 FOTIC_SOV_1990.209.a:0 "Закрыть опасное производство"
 FOTIC_SOV_1990.209.b:0 "Сохранить работу объекта"
  FOTIC_SOV_1990.210.t:0 "Памятник Ленину"
  FOTIC_SOV_1990.210.d:0 "Памятник Ленину в центре города стал местом для митингов и пикетов. Часть людей требует его сохранить, другая часть считает, что он уже не нужен. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.210.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.210.b:0 "Демонтажировать
  FOTIC_SOV_1990.211.t:0 "Памятник Сталину"
  FOTIC_SOV_1990.211.d:0 "Памятник Сталину в одном из городов стал объектом споров. Часть жителей считает его символом прошлого, другая часть видит в нём память о победе и индустриализации. Власти не знают, как поступить с этим памятником."
