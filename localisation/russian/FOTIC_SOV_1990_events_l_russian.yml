  fотик_сов_1990.215.t:0 "Памятник Ельцину"
  FOTIC_SOV_1990.215.d:0 "Памятник Ельцину в одном из городов стал объектом споров. Часть жителей считает его символом перемен, другая часть видит в нём память о кризисах и распаде. Власти не знают, как поступить с этим памятником."
  FOTIC_SOV_1990.215.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.215.b:0 "Демонтажировать"
  FOTIC_SOV_1990.216.t:0 "Памятник Ельцину"
  FOTIC_SOV_1990.216.d:0 "Памятник Ельцину в одном из городов стал объектом споров. Часть жителей считает его символом перемен, другая часть видит в нём память о кризисах и распаде. Власти не знают, как поступить с этим памятником."
  FOTIC_SOV_1990.216.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.216.b:0 "Демонтажировать"
  FOTIC_SOV_1990.217.t:0 "Ленин и Сталин в одном ряду"
  FOTIC_SOV_1990.217.d:0 "Памятники Ленину и Сталину в одном городе стали предметом споров. Часть жителей считает их символами прошлого, другая часть видит в них память о победе и индустриализации. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.217.a:0 "Сохранить оба памятника"
  FOTIC_SOV_1990.217.b:0 "Демонтажировать оба памятника"
  FOTIC_SOV_1990.218.t:0 "Вчера и сегодня"
  FOTIC_SOV_1990.218.d:0 "Памятники Ленину, Сталину, Дзержинскому, Брежневу, Горбачёву и Ельцину в одном городе стали объектом споров. Часть жителей считает их символами прошлого, другая часть видит в них память о победе, индустриализации, переменах и кризисах. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.218.a:0 "Сохранить все памятники"
  FOTIC_SOV_1990.218.b:0 "Демонтажировать все памятники"
  FOTIC_SOV_1990.219.t:0 "Олигархи и власть"
  FOTIC_SOV_1990.219.d:0 "Появление олигархов, которые быстро обогащаются на приватизации и новых возможностях, вызывает вопросы о том, кто контролирует власть и ресурсы. Часть населения видит в них символ перемен, другая часть считает их паразитами. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.219.a:0 "Принять олигархов как часть новой экономики"
  FOTIC_SOV_1990.219.b:0 "Проводить политику против олигархов"
  FOTIC_SOV_1990.220.t:0 "Памятник будущему"
  FOTIC_SOV_1990.220.d:0 "Памятник  будущему в одном из городов стал объектом споров. Часть жителей считает его символом надежды и прогресса, другая часть видит в нём пустышку и отвлечение от реальных проблем. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.220.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.220.b:0 "Демонтажировать памятник"
  FOTIC_SOV_1990.221.t:0 "Памятник Памятнику".
  FOTIC_SOV_1990.221.d:0 "Памятник Памятнику в одном из городов стал объектом споров. Часть жителей считает его символом метамodернизма и самоиронии, другая часть видит в нём бессмысленную провокацию. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.221.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.221.b:0 "Демонтажировать памятник"
  FOTIC_SOV_1990.222.t:0 "Памятник Памятнику Памятнику"
  FOTIC_SOV_1990.222.d:0 "Памятник Памятнику Памятнику в одном из городов стал объектом споров. Часть жителей считает его символом постмодернизма и абсурда, другая часть видит в нём бессмысленную провокацию. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.222.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.222.b:0 "Демонтажировать памятник"
  FOTIC_SOV_1990.223.t:0 "Памятник Памятнику Памятнику Памятнику"
  FOTIC_SOV_1990.223.d:0 "Памятник Памятнику Памятнику Памятнику в одном из городов стал объектом споров. Часть жителей считает его символом абсурда и самоиронии, другая часть видит в нём бессмысленную провокацию. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.223.a:0 "Сохранить памятник"
  FOTIC_SOV_1990.223.b:0 "Демонтажировать памятник"
  FOTIC_SOV_1990.224.t:0 "Хочу колбасу!"
  FOTIC_SOV_1990.224.d:0 "На центральной площади проходит митинг с требованием обеспечить поставки колбасы. Люди скандируют лозунги, а милиция не вмешивается. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.224.a:0 "Обещать поставки колбасы"
  FOTIC_SOV_1990.224.b:0 "Говорить о что все евреи виноваты в дефиците колбасы"
  FOTIC_SOV_1990.225.c:0 "Говорить о том, что колбаса уже есть, просто её не видать"
  FOTIC_SOV_1990.225.t:0 "Колбаса есть!"
  FOTIC_SOV_1990.225.d:0 "Поставки колбасы налажены, и в магазинах снова появляется этот дефицитный продукт. Люди радуются, а власти используют это как доказательство своей эффективности. Но многие уже не верят, что колбаса будет всегда."
  FOTIC_SOV_1990.225.a:0 "Отметить успех в СМИ"
  FOTIC_SOV_1990.225.b:0 "Сохранить молчание"
  FOTIC_SOV_1990.226.t:0 "Колбаса закончилась"
  FOTIC_SOV_1990.226.d:0 "Поставки колбасы снова нарушены, и магазины снова пустеют. Люди разочарованы, а власти оказываются в сложной ситуации: обещать новые поставки или признать проблему."
  FOTIC_SOV_1990.226.a:0 "Обещать новые поставки"
  FOTIC_SOV_1990.226.b:0 "Признать проблему и искать решение"
  FOTIC_SOV_1990.227.t:0 "Колбаса навсегда!"
  FOTIC_SOV_1990.227.d:0 "Поставки колбасы стабилизированы, и власти объявляют, что колбаса теперь будет всегда. Люди с осторожным оптимизмом воспринимают эту новость, но многие уже не верят в обещания."
  FOTIC_SOV_1990.227.a:0 "Праздновать победу над дефицитом"
  FOTIC_SOV_1990.227.b:0 "Сохранить молчание и работать над улучшением поставок"
  FOTIC_SOV_1990.228.t:0 "Колбаса снова закончилась"
  FOTIC_SOV_1990.228.d:0 "Поставки колбасы снова нарушены, и магазины снова пустеют. Люди разочарованы, а власти оказываются в сложной ситуации: обещать новые поставки или признать проблему."
  FOTIC_SOV_1990.228.a:0 "Обещать новые поставки"
  FOTIC_SOV_1990.228.b:0 "Признать проблему и искать решение"
  FOTIC_SOV_1990.229.t:0 "Памятник колбасе"
  FOTIC_SOV_1990.229.d:0 "Памятник колбасе в одном из городов стал объектом споров. Часть жителей считает его символом борьбы с дефицитом, другая часть видит в нём память о неэффективности и обещаниях. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.229.a:0 "Сохранить памятник и продать его за колбасу"
  FOTIC_SOV_1990.229.b:0 "Демонтажировать памятник и использовать материалы для производства колбасы"
  FOTIC_SOV_1990.229.c:0 "Оставить памятник, но не упоминать его в СМИ"
  FOTIC_SOV_1990.230.t:0 "Колбаса и политика"
  FOTIC_SOV_1990.230.d:0 "Колбаса стала идти на выборы колбаса хочет демократии и реформ колбаса против коррупции колбаса за стабильность колбаса против перемен. Власти не знают, как реагировать на эту новую точку напряжения."
  FOTIC_SOV_1990.230.a:0 "Использовать колбасу как символ своей политики"
  FOTIC_SOV_1990.230.b:0 "Отделить колбасу и сьесть её в тишине"
  FOTIC_SOV_1990.230.c:0 "Говорить о том, что колбаса уже есть, просто её не видать" 
  FOTIC_SOV_1990.231.t:0 "Министр колбаысы"
  FOTIC_SOV_1990.231.d:0 "Министр колбасы сьел всю колбасу"
  FOTIC_SOV_1990.231.a:0 "Назначить нового министра колбасы"
  FOTIC_SOV_1990.231.b:0 "Провести расследование и наказать министра колбасы"
  FOTIC_SOV_1990.231.c:0 "Сохранить министра колбасы и обещать, что такого больше не повторится"
  FOTIC_SOV_1990.232.t:0 "Колбаса и союз"

