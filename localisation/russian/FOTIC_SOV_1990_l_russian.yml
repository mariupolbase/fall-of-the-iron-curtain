l_russian:
 FOTIC_SOV_1990.1.a: "Начать"

 FOTIC_SOV_1990.2.t: "Первое утро 1990 года"
 FOTIC_SOV_1990.2.d: "В Кремле год начинается с папок. Снабжение, республики, армия, КГБ, партия. На каждой папке аккуратная машинописная шапка. Внутри — цифры, которые не сходятся друг с другом."
 FOTIC_SOV_1990.2.a: "Начать с хозяйственных отчётов"
 FOTIC_SOV_1990.2.b: "Сначала политическая реформа"
 FOTIC_SOV_1990.2.c: "Пусть КГБ даст полную картину"
 FOTIC_SOV_1990.2.e: "Армия должна оставаться спокойной"

 FOTIC_SOV_1990.100.a: "Продолжать"

 SOV_idea_supply_breakdown: "Срыв снабжения"
 SOV_idea_supply_breakdown_desc: "Государство ещё распределяет товары, но всё чаще распределяет отсутствие товаров. В отчётах поставки идут по графику. В магазинах график не видели."

 SOV_idea_party_without_monolith: "Партия без монолита"
 SOV_idea_party_without_monolith_desc: "КПСС остаётся основой власти, но внутри неё уже несколько лагерей. Одни говорят о реформе. Другие ждут отката. Третьи смотрят, куда перейдёт собственность."

 SOV_idea_afghan_shadow: "Афганская тень"
 SOV_idea_afghan_shadow_desc: "Война закончилась, но армия не считает вопрос закрытым. Офицеры помнят приказы, которые потом никто не хотел объяснять."

 SOV_idea_uncontrolled_glastnost: "Гласность без тормозов"
 SOV_idea_uncontrolled_glastnost_desc: "Газеты печатают то, что раньше не произносили вслух. Аппарат читает свежий номер и узнаёт, что страна обсуждает его без разрешения."

 SOV_idea_republics_count_powers: "Республики считают полномочия"
 SOV_idea_republics_count_powers_desc: "Республиканские лидеры больше не ждут, пока Москва решит всё сама. Каждый новый кризис центра становится аргументом в пользу суверенитета."

 SOV_idea_shadow_economy: "Теневая экономика"
 SOV_idea_shadow_economy_desc: "Товар исчезает из магазина, но появляется у того, кто знает склад, завмага, валютчика или человека в милиции."

 FOTIC_SOV_1990.10.t: "Несоответствие на складах"
 FOTIC_SOV_1990.10.d: "Данные инспекции указывают на серьёзные расхождения между официальными отчётами и реальными запасами продовольствия."
 FOTIC_SOV_1990.10.a: "Расследовать через КГБ"
 FOTIC_SOV_1990.10.b: "Принять доклад к сведению"
 FOTIC_SOV_1990.10.c: "Засекретить информацию"

 FOTIC_SOV_1990.90.t: "Итоги 1990 года"
 FOTIC_SOV_1990.90.d: "Первый год кризисного управления позади. Баланс подведён. Страна стоит на распутье."
 FOTIC_SOV_1990.90.a: "Работать дальше"
