  90x.nkr.1.t:0 "Политическая ситуация КНДР — начало 1990-х"
  90x.nkr.1.d:0 "В начале 1990-х КНДР переживала период глубокой политической и экономической изоляции. После распада Советского Союза режим лишился значительной внешней поддержки и столкнулся с нарастающим экономическим кризисом. В стране доминировала Трудовая партия Кореи и культ личности основателя Ким Ир Сена, при этом процесс передачи власти к следующему поколению (Ким Чен Иру) уже происходил. Идеология чучхе, строгая централизация и жёсткий контроль над обществом определяли внутреннюю политику, а дефицит ресурсов и продовольствия усугублял напряжённость внутри страны."
  90x.nkr.1.a:0 "Понятно"
