 idea_wto_membership:0 "Организация Варшавского договора"
 idea_wto_membership_desc:0 "Страна состоит в Организации Варшавского договора под началом Москвы. Пока блок держится, выйти из него, вступить в другой союз или создать свой нельзя — судьба ОВД решается в Кремле. Освобождение придёт позднее, отдельным решением Союза."
