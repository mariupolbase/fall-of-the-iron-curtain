l_russian:
 SOV_1990_first_session:0 "Первое заседание 1990 года"
 SOV_1990_first_session_desc:0 "Новый год не оставил времени на раскачку. На столе уже лежат тревожные сводки о снабжении, сообщения из республик и записки о разногласиях внутри партии. Прежде чем выбирать курс, руководству придётся признать масштаб проблем."
 SOV_1990_supply_over_slogans:0 "Снабжение важнее лозунгов"
 SOV_1990_supply_over_slogans_desc:0 "Новые обещания не сократят очереди. Совету министров придётся заняться поставками в города, даже если ради этого потребуется пересмотреть привычный порядок распределения."
 SOV_1990_check_the_warehouses:0 "Проверить склады, а не отчёты"
 SOV_1990_check_the_warehouses_desc:0 "Министерские сводки обещают приемлемые запасы, но сообщения из областей рисуют другую картину. Прежде чем менять нормы снабжения, правительству придётся выяснить, сколько товаров существует только на бумаге."
 SOV_1990_keep_cpsu_together:0 "Сохранить единство КПСС"
 SOV_1990_keep_cpsu_together_desc:0 "После нескольких лет споров партийные структуры всё хуже выполняют решения центра. Без уступок обкомам и внутренней дисциплины аппарат начнёт действовать каждый за себя."
 SOV_1990_reform_the_apparat:0 "Перестроить аппарат"
 SOV_1990_reform_the_apparat_desc:0 "Прежний порядок согласований работает всё медленнее. Часть должностей придётся перераспределить, часть ведомств — заставить отвечать не за отчётность, а за результат."
 SOV_1990_ryzhkovs_tables:0 "Таблицы Рыжкова"
 SOV_1990_ryzhkovs_tables_desc:0 "Совет министров требует собрать реальный баланс: что произведено, что осталось на складах и где уже сорваны поставки. Итоговые таблицы могут оказаться неприятнее политических докладов."
 SOV_1990_presidential_question:0 "Вопрос о президентстве"
 SOV_1990_presidential_question_desc:0 "Новый пост должен дать Горбачёву полномочия, которых уже не обеспечивает руководство партией. Но перенос центра тяжести в государственные институты неизбежно ослабит КПСС."
 SOV_1990_conservative_patience:0 "Терпение консерваторов"
 SOV_1990_conservative_patience_desc:0 "Для части аппарата перестройка уже зашла слишком далеко. Пока её представители готовы обсуждать компромисс, но требуют остановить дальнейшее отступление партии."
 SOV_1990_yakovlevs_line:0 "Линия Яковлева"
 SOV_1990_yakovlevs_line_desc:0 "Яковлев считает, что половинчатые меры лишь растягивают кризис. Гласность и политическая конкуренция должны получить продолжение, даже если партия утратит часть привычного контроля."
 SOV_1990_lubyanka_report:0 "Доклад с Лубянки"
 SOV_1990_lubyanka_report_desc:0 "Закрытая сводка КГБ перечисляет очаги напряжения по республикам: митинги, народные фронты, споры о языке и требования суверенитета. Речь уже не об отдельных выступлениях, а о реакции союзного центра."
 SOV_1990_lithuanian_challenge:0 "Литовский вызов"
 SOV_1990_lithuanian_challenge_desc:0 "11 марта Верховный Совет Литвы объявил о восстановлении независимого государства. Москва должна решить, добиваться ли отмены этого акта давлением или начинать переговоры."
 SOV_1990_controlled_cooperatives:0 "Кооперативы под надзором"
 SOV_1990_controlled_cooperatives_desc:0 "Закрывать кооперативы поздно, а оставлять их без контроля правительство не готово. Разрешения, проверки и налоги должны удержать частную инициативу в установленных границах."
 SOV_1990_ration_cards:0 "Вернуться к карточкам"
 SOV_1990_ration_cards_desc:0 "Во многих городах товаров уже не хватает даже при формально выполненных планах. Карточки не устранят дефицит, но позволят распределять остатки без бесконечных очередей и случайности."
 SOV_1990_article_six:0 "Переписать шестую статью"
 SOV_1990_article_six_desc:0 "Закреплённая в Конституции руководящая роль КПСС больше не соответствует политической реальности. Изменение шестой статьи откроет дорогу другим партиям и лишит аппарат прежней опоры."
 SOV_1990_obkom_promises:0 "Договориться с обкомами"
 SOV_1990_obkom_promises_desc:0 "Региональные партийные комитеты требуют гарантий, прежде чем поддержать новый курс. Их лояльность ещё можно сохранить, но за неё придётся расплачиваться должностями и уступками."
 SOV_1990_party_is_not_enough:0 "Одной партии недостаточно"
 SOV_1990_party_is_not_enough_desc:0 "КПСС по-прежнему располагает огромным аппаратом, но уже не может одна удерживать все рычаги управления. Государственным институтам придётся брать на себя то, что раньше решалось партийным распоряжением."
 SOV_1990_kgb_watches_fronts:0 "Народные фронты под наблюдением"
 SOV_1990_kgb_watches_fronts_desc:0 "КГБ расширяет наблюдение за организациями, которые ещё недавно считались культурными и общественными объединениями. В Прибалтике, Закавказье и Молдавии они всё чаще выступают как самостоятельная политическая сила."
 SOV_1990_legal_path_to_secession:0 "Выход только по процедуре"
 SOV_1990_legal_path_to_secession_desc:0 "Закон о порядке выхода республик из СССР должен перевести конфликт из лозунгов в процедуру: референдум, переходный период, переговоры об имуществе и границах. Для одних это правовая рамка, для других — попытка затянуть спор."
 SOV_1990_baltic_economic_pressure:0 "Надавить на Вильнюс"
 SOV_1990_baltic_economic_pressure_desc:0 "После отказа литовского руководства отменить акт 11 марта Москва может сократить централизованные поставки нефти, газа и сырья. Это сильный рычаг, но он быстро превратит спор в открытое противостояние."
 SOV_1990_director_barter:0 "Директорский бартер"
 SOV_1990_director_barter_desc:0 "Предприятия всё чаще договариваются напрямую: металл меняют на топливо, комплектующие — на продовольствие для рабочих. Такие сделки поддерживают производство, но ещё сильнее размывают единый план."
 SOV_1990_year_of_decrees:0 "Год указов"
 SOV_1990_year_of_decrees_desc:0 "После учреждения президентского поста у союзного руководства появляется новый способ обходить медленные согласования. Указы позволяют действовать быстрее, но не гарантируют исполнения на местах."
 SOV_1990_yazov_demands_clarity:0 "Язов требует ясности"
 SOV_1990_yazov_demands_clarity_desc:0 "Министерство обороны требует чётких указаний: где заканчивается политический спор и начинается угроза порядку. Армия не хочет принимать решения за гражданское руководство."
 SOV_1990_keep_army_in_barracks:0 "Армия вне политики"
 SOV_1990_keep_army_in_barracks_desc:0 "Вооружённые силы не должны становиться участником аппаратной борьбы. Командованию следует напомнить: его задача — выполнять законные приказы, а не выбирать победителя в политическом споре."
 SOV_1990_negotiate_with_baltics:0 "Переговоры с Прибалтикой"
 SOV_1990_negotiate_with_baltics_desc:0 "Силовое давление не вернёт прежнего доверия. Москва должна открыть прямые переговоры с руководством Литвы, Латвии и Эстонии и выяснить, осталось ли пространство для соглашения."
 SOV_1990_ukrainian_weight:0 "Украинский фактор"
 SOV_1990_ukrainian_weight_desc:0 "Декларация о суверенитете Украинской ССР затрагивает не только символы: республика заявляет о верховенстве своих законов, экономической самостоятельности и собственной позиции при заключении Союзного договора. Без Киева обновлённый Союз останется на бумаге."
 SOV_1990_close_the_distributors:0 "Закрыть распределители"
 SOV_1990_close_the_distributors_desc:0 "Спецраспределители всё труднее оправдывать перед людьми, которые часами стоят в очередях. Их закрытие не наполнит магазины, но покажет, что аппарат готов отказаться хотя бы от части собственных привилегий."
 SOV_1990_leave_the_distributors:0 "Сохранить распределители"
 SOV_1990_leave_the_distributors_desc:0 "Ведомственные распределители обеспечивают аппарат товарами, которых нет в обычной продаже. Отказ от них ударит по чиновникам именно тогда, когда от их исполнительности зависит слишком многое."
 SOV_1990_year_end_balance:0 "Итоги первого года"
 SOV_1990_year_end_balance_desc:0 "Первый год кризисного управления подходит к концу. Одни решения дали центру передышку, другие лишь отложили спор. Пора свести результаты и понять, с чем страна входит в 1991 год."
 SOV_1990_files_on_republics:0 "Досье на республики"
 SOV_1990_files_on_republics_desc:0 "КГБ собирает сведения о республиканских руководителях, депутатах и активистах народных фронтов. Эти материалы пригодятся для давления, переговоров и поиска слабых мест."
 SOV_1990_emergency_drafts:0 "Проекты чрезвычайных указов"
 SOV_1990_emergency_drafts_desc:0 "Юристы и ведомства готовят проекты указов на случай чрезвычайного положения. Пока это только папки с черновиками, но сам факт их появления меняет разговор внутри руководства."
 SOV_1990_kazakh_guarantees:0 "Гарантии от Казахстана"
 SOV_1990_kazakh_guarantees_desc:0 "Назарбаев готов обсуждать обновлённый Союз, если республики получат больше реальных полномочий. Поддержка Казахстана укрепит позиции Москвы, но потребует содержательных уступок."
 SOV_1990_russian_question:0 "Российский вопрос"
 SOV_1990_russian_question_desc:0 "РСФСР перестала быть просто крупнейшей союзной республикой. Её новые органы власти всё громче говорят от собственного имени, и союзному центру придётся определить отношение к этому вызову."
 SOV_1990_talk_to_yeltsin:0 "Договориться с Ельциным"
 SOV_1990_talk_to_yeltsin_desc:0 "Прямой разговор с руководством РСФСР может снизить напряжение и вернуть спор в переговорное русло. Но любая уступка Ельцину вызовет раздражение в партийном аппарате."
 SOV_1990_isolate_yeltsin:0 "Изолировать Ельцина"
 SOV_1990_isolate_yeltsin_desc:0 "Союзный центр может ограничить доступ российского руководства к трибунам, союзникам и административным ресурсам. Давление ослабит соперника только в том случае, если не превратит его в символ сопротивления."
 SOV_1990_support_moderates_rsfsr:0 "Поддержать умеренных в РСФСР"
 SOV_1990_support_moderates_rsfsr_desc:0 "Не все российские депутаты готовы идти на открытый конфликт с союзным центром. Работа через умеренных позволит выиграть время, но потребует уступок и внимательной аппаратной игры."
 SOV_1990_laws_war:0 "Война законов"
 SOV_1990_laws_war_desc:0 "Российские и союзные постановления всё чаще противоречат друг другу. Когда два центра власти требуют разного, исполкомы и ведомства начинают выбирать, чьи указания выполнять."
 SOV_1990_russia_inside_union:0 "Россия внутри Союза"
 SOV_1990_russia_inside_union_desc:0 "Без согласия РСФСР новый Союзный договор останется декларацией. Москве необходимо закрепить российские полномочия так, чтобы республика получила вес, но не превратилась в отдельный центр притяжения."
 SOV_1990_moscow_against_moscow:0 "Москва против Москвы"
 SOV_1990_moscow_against_moscow_desc:0 "Союзное и российское руководство работают в одном городе, но всё чаще говорят как противники. Дальнейшие решения будут определять не только отношения с РСФСР, но и способность центра управлять остальными республиками."
 SOV_1990_miners_telegram:0 "Шахтёрская телеграмма"
 SOV_1990_miners_telegram_desc:0 "Из угольных регионов приходят требования о зарплатах, снабжении и условиях труда. Рабочие комитеты больше не готовы ждать очередного обещания из Москвы."
 SOV_1990_buy_social_peace:0 "Купить социальный мир"
 SOV_1990_buy_social_peace_desc:0 "Дополнительные поставки и выплаты помогут снять напряжение в шахтёрских регионах. Но ресурсы придётся изъять у других получателей, а дефицит никуда не исчезнет."
 SOV_1990_union_trade_unions:0 "Вернуть профсоюзам голос"
 SOV_1990_union_trade_unions_desc:0 "Официальные профсоюзы всё ещё располагают кабинетами, связями и доступом к предприятиям. Если дать им больше самостоятельности, они смогут вернуть часть рабочих комитетов в переговорное поле."
 SOV_1990_limit_rallies:0 "Ограничить митинги"
 SOV_1990_limit_rallies_desc:0 "Новые правила согласования дадут МВД основания пресекать несогласованные акции. На улицах станет спокойнее, но для прессы и сторонников реформ это будет явным шагом назад."
 SOV_1990_let_them_speak:0 "Пусть говорят"
 SOV_1990_let_them_speak_desc:0 "Запретами недовольство не исчезнет. Свободные митинги и публикации снизят напряжение сейчас, но дадут общественным движениям новые площадки и новых сторонников."
 SOV_1990_television_is_not_a_wall:0 "Телевидение больше не молчит"
 SOV_1990_television_is_not_a_wall_desc:0 "Очереди, забастовки и споры о республиках всё чаще попадают в эфир. После этого прежняя картина благополучия становится невозможной даже для тех, кто предпочитал не замечать перемен."
 SOV_1990_street_has_memory:0 "Ответ улице"
 SOV_1990_street_has_memory_desc:0 "Люди запомнят, как власть отвечала на митинги и забастовки: запретами, уступками или попыткой разговора. В следующем кризисе это окажется важнее очередного официального заявления."
