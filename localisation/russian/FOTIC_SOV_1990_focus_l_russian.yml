l_russian:
 SOV_1990_first_session:0 "Первая сессия Съезда"
 SOV_1990_first_session_desc:0 "Съезд народных депутатов открывает новую сессию. Горбачёв ищет баланс между реформаторами и консерваторами."
 SOV_1990_supply_over_slogans:0 "Снабжение вместо лозунгов"
 SOV_1990_supply_over_slogans_desc:0 "Прагматики требуют конкретных шагов по стабилизации снабжения городов."
 SOV_1990_check_the_warehouses:0 "Ревизия складов"
 SOV_1990_check_the_warehouses_desc:0 "Несоответствие в отчётах о продовольственных запасах требует немедленной проверки."
 SOV_1990_keep_cpsu_together:0 "Единство партии"
 SOV_1990_keep_cpsu_together_desc:0 "Дисциплина и единоначалие — основа сохранения партийной власти."
 SOV_1990_reform_the_apparat:0 "Реформа аппарата"
 SOV_1990_reform_the_apparat_desc:0 "Аппарат должен адаптироваться к новой реальности или уступить дорогу."
 SOV_1990_ryzhkovs_tables:0 "Таблицы Рыжкова"
 SOV_1990_ryzhkovs_tables_desc:0 "Правительство Рыжкова составляет сводные балансы ресурсов по всем отраслям."
 SOV_1990_presidential_question:0 "Вопрос о президентстве"
 SOV_1990_presidential_question_desc:0 "Создание поста Президента СССР меняет баланс власти между партией и государством."
 SOV_1990_conservative_patience:0 "Терпение консерваторов"
 SOV_1990_conservative_patience_desc:0 "Консервативное крыло требует уступок в обмен на отказ от открытого противостояния."
 SOV_1990_yakovlevs_line:0 "Линия Яковлева"
 SOV_1990_yakovlevs_line_desc:0 "Александр Яковлев настаивает на углублении гласности и политическом плюрализме."
 SOV_1990_lubyanka_report:0 "Доклад с Лубянки"
 SOV_1990_lubyanka_report_desc:0 "КГБ представляет закрытый доклад о положении в республиках и масштабах национальных движений."
 SOV_1990_lithuanian_challenge:0 "Литовский вызов"
 SOV_1990_lithuanian_challenge_desc:0 "Литва провозглашает независимость. Москва должна выбрать между силой и переговорами."
 SOV_1990_controlled_cooperatives:0 "Контролируемые кооперативы"
 SOV_1990_controlled_cooperatives_desc:0 "Кооперативное движение получает ограниченную поддержку при сохранении государственного контроля."
 SOV_1990_ration_cards:0 "Карточная система"
 SOV_1990_ration_cards_desc:0 "Введение карточек на основные товары упорядочит распределение и снизит дефицит."
 SOV_1990_article_six:0 "Шестая статья"
 SOV_1990_article_six_desc:0 "Отмена шестой статьи Конституции о монополии КПСС открывает путь к многопартийности."
 SOV_1990_obkom_promises:0 "Обещания обкомам"
 SOV_1990_obkom_promises_desc:0 "Региональные партийные комитеты получают гарантии своего положения в обмен на лояльность."
 SOV_1990_party_is_not_enough:0 "Партии недостаточно"
 SOV_1990_party_is_not_enough_desc:0 "Признание: одной КПСС уже не хватает для управления страной в условиях нарастающего кризиса."
 SOV_1990_kgb_watches_fronts:0 "КГБ наблюдает фронты"
 SOV_1990_kgb_watches_fronts_desc:0 "Активизация наблюдения за народными фронтами в Прибалтике, Закавказье и Молдавии."
 SOV_1990_legal_path_to_secession:0 "Правовой выход"
 SOV_1990_legal_path_to_secession_desc:0 "Разработка закона о порядке выхода республик из СССР снимает политическую напряжённость."
 SOV_1990_baltic_economic_pressure:0 "Экономическое давление на Прибалтику"
 SOV_1990_baltic_economic_pressure_desc:0 "Ограничение поставок энергоресурсов и сырья — инструмент давления на Вильнюс."
 SOV_1990_director_barter:0 "Директорский бартер"
 SOV_1990_director_barter_desc:0 "Директора предприятий налаживают прямые обменные сети в обход Госплана."
 SOV_1990_year_of_decrees:0 "Год указов"
 SOV_1990_year_of_decrees_desc:0 "Президентские указы становятся главным инструментом управления в обход партийных структур."
 SOV_1990_yazov_demands_clarity:0 "Язов требует ясности"
 SOV_1990_yazov_demands_clarity_desc:0 "Министр обороны требует чёткого политического курса. Армия не хочет быть жертвой политического торга."
 SOV_1990_keep_army_in_barracks:0 "Армия вне политики"
 SOV_1990_keep_army_in_barracks_desc:0 "Вооружённые силы должны оставаться профессиональным инструментом, а не политическим актором."
 SOV_1990_negotiate_with_baltics:0 "Переговоры с прибалтами"
 SOV_1990_negotiate_with_baltics_desc:0 "Прямые переговоры с руководством Литвы, Латвии и Эстонии о статусе в обновлённом Союзе."
 SOV_1990_ukrainian_weight:0 "Украинский фактор"
 SOV_1990_ukrainian_weight_desc:0 "Украина заявляет о государственном суверенитете над своими природными ресурсами и бюджетом."
 SOV_1990_close_the_distributors:0 "Закрыть распределители"
 SOV_1990_close_the_distributors_desc:0 "Ликвидация номенклатурных распределителей — символический жест реформы и источник народного доверия."
 SOV_1990_leave_the_distributors:0 "Сохранить распределители"
 SOV_1990_leave_the_distributors_desc:0 "Система привилегий аппарата сохраняется как инструмент дисциплины и лояльности чиновничества."
 SOV_1990_year_end_balance:0 "Итоги первого года"
 SOV_1990_year_end_balance_desc:0 "Пора подвести черту под первым годом кризисного управления. Что удалось, что упущено?"
 SOV_1990_files_on_republics:0 "Досье на республики"
 SOV_1990_files_on_republics_desc:0 "КГБ систематизирует компромат на республиканских лидеров и готовит досье на ключевых фигурантов."
 SOV_1990_emergency_drafts:0 "Проекты чрезвычайных указов"
 SOV_1990_emergency_drafts_desc:0 "Секретные черновики на случай введения чрезвычайного положения хранятся в надёжных руках."
 SOV_1990_kazakh_guarantees:0 "Казахские гарантии"
 SOV_1990_kazakh_guarantees_desc:0 "Назарбаев обещает поддержку обновлённого Союзного договора в обмен на расширение республиканских полномочий."
