 fotic_economic_model_command_economy:0 "Командная экономика"
 fotic_economic_model_command_economy_desc:0 "Жёсткое государственное планирование. Управляемо и стабильно, но неэффективно, дефицит давит."
 fotic_economic_model_limited_khozraschyot:0 "Ограниченный хозрасчёт"
