 fotic_labour_planned_employment:0 "Плановая занятость"
 fotic_labour_planned_employment_desc:0 "Полная занятость по плану. Стабильно, но негибко."
 fotic_labour_state_labour_mobilisation:0 "Государственная трудмобилизация"
 fotic_labour_state_labour_mobilisation_desc:0 "Директивное распределение рабочей силы. Рост мобилизационной промышленности ценой стабильности."
 fotic_labour_enterprise_autonomy:0 "Самостоятельность предприятий"
 fotic_labour_enterprise_autonomy_desc:0 "Предприятия сами распоряжаются трудом. Гибче, но менее устойчиво."
 fotic_labour_labour_market:0 "Рынок труда"
 fotic_labour_labour_market_desc:0 "Свободный найм и увольнения. Эффективность ценой стабильности и потребления."
 fotic_labour_workplace_partnership:0 "Социальное партнёрство"
 fotic_labour_workplace_partnership_desc:0 "Согласование труда и капитала. Стабильно и продуктивно."
 fotic_labour_emergency_labour_duty:0 "Трудовая повинность"
 fotic_labour_emergency_labour_duty_desc:0 "Принудительная мобилизация труда. Только в кризис."
 fotic_conscription_volunteer:0 "Добровольческая армия"
 fotic_conscription_volunteer_desc:0 "Малый профессиональный набор. Меньше людей, ниже военная поддержка."
 fotic_conscription_limited:0 "Ограниченный призыв"
 fotic_conscription_limited_desc:0 "Скромный призывной контингент."
 fotic_conscription_standard_draft:0 "Всеобщий призыв"
 fotic_conscription_standard_draft_desc:0 "Стандартная всеобщая воинская обязанность."
 fotic_conscription_extensive:0 "Расширенный призыв"
 fotic_conscription_extensive_desc:0 "Широкий охват призыва ценой стабильности."
 fotic_conscription_total_mobilisation:0 "Всеобщая мобилизация"
 fotic_conscription_total_mobilisation_desc:0 "Под ружьё ставят всех. Только в кризис."
 fotic_defence_minimal_spending:0 "Минимальные расходы"
 fotic_defence_minimal_spending_desc:0 "Армия по остаточному принципу. Меньше потребительской нагрузки, слабее ВПК."
 fotic_defence_balanced_spending:0 "Сбалансированные расходы"
 fotic_defence_balanced_spending_desc:0 "Умеренный военный бюджет."
 fotic_defence_elevated_spending:0 "Повышенные расходы"
 fotic_defence_elevated_spending_desc:0 "Крупный военный бюджет ценой потребления."
 fotic_defence_war_budget:0 "Военный бюджет"
 fotic_defence_war_budget_desc:0 "Приоритет армии. Сильный ВПК ценой стабильности и потребления."
 fotic_defence_guns_over_butter:0 "Пушки вместо масла"
 fotic_defence_guns_over_butter_desc:0 "Максимум на оборону. Военная поддержка растёт, гражданское падает."
 fotic_defind_state_arsenal:0 "Государственный ВПК"
 fotic_defind_state_arsenal_desc:0 "Единый военно-промышленный комплекс. Мощный, но негибкий."
 fotic_defind_design_bureaus:0 "Конструкторские бюро"
 fotic_defind_design_bureaus_desc:0 "Ставка на КБ и НИОКР. Быстрее исследования, медленнее серия."
 fotic_defind_dual_use:0 "Двойное назначение"
 fotic_defind_dual_use_desc:0 "Сбалансированный гражданско-военный выпуск."
 fotic_defind_export_oriented:0 "Экспортный ВПК"
 fotic_defind_export_oriented_desc:0 "Оружие на экспорт. Торговые плюсы и валюта."
 fotic_defind_conversion:0 "Конверсия ВПК"
 fotic_defind_conversion_desc:0 "Перевод оборонки на гражданскую продукцию. Гражданский рост ценой военного потенциала."
 fotic_health_universal_state_health:0 "Государственная медицина"
 fotic_health_universal_state_health_desc:0 "Бесплатная медицина для всех (система Семашко). Стабильность ценой бюджета."
 fotic_health_basic_public_health:0 "Базовое здравоохранение"
 fotic_health_basic_public_health_desc:0 "Минимальные государственные гарантии здоровья."
 fotic_health_mixed_healthcare:0 "Смешанная медицина"
 fotic_health_mixed_healthcare_desc:0 "Сочетание государственного и платного."
 fotic_health_insurance_based:0 "Страховая медицина"
 fotic_health_insurance_based_desc:0 "Медицина через страхование. Устойчиво, но дороже для людей."
 fotic_health_minimal_healthcare:0 "Минимальная медицина"
 fotic_health_minimal_healthcare_desc:0 "Государство почти уходит из здравоохранения."
 fotic_edu_state_education:0 "Государственное образование"
 fotic_edu_state_education_desc:0 "Единая бесплатная школа и вузы. Наука и стабильность."
 fotic_edu_technical_focus:0 "Технический уклон"
 fotic_edu_technical_focus_desc:0 "Упор на инженеров и производство."
 fotic_edu_broad_education:0 "Широкое образование"
 fotic_edu_broad_education_desc:0 "Массовое разностороннее образование. Сильная наука."
 fotic_edu_mixed_education:0 "Смешанная система"
 fotic_edu_mixed_education_desc:0 "Государственное и частное образование."
 fotic_edu_minimal_education:0 "Минимальное образование"
 fotic_edu_minimal_education_desc:0 "Сворачивание образовательных программ."

 FOTIC_economic_model_category:0 "Экономическая модель — смена курса"
 FOTIC_econ_to_command_economy:0 "Ввести командную экономику"
 FOTIC_econ_to_command_economy_desc:0 "Сменить экономическую модель на командную. После смены курс закрыт на 180 дней."
 FOTIC_econ_to_limited_khozraschyot:0 "Перейти к ограниченному хозрасчёту"
 FOTIC_econ_to_limited_khozraschyot_desc:0 "Сменить экономическую модель. После смены курс закрыт на 180 дней."
 FOTIC_econ_to_regulated_mixed:0 "Перейти к регулируемой смешанной экономике"
