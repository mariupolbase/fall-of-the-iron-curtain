 fotic_economic_model_command_economy:0 "Командная экономика"
 fotic_economic_model_command_economy_desc:0 "Высокий контроль государства и мобилизационный потенциал ценой гибкости гражданской экономики и торговли."
 fotic_economic_model_limited_khozraschyot:0 "Ограниченный хозрасчёт"
 fotic_economic_model_limited_khozraschyot_desc:0 "Предприятия получают часть самостоятельности, но центр начинает терять управляемость и мобилизационную эффективность."
 fotic_economic_model_regulated_mixed_economy:0 "Регулируемая смешанная экономика"
 fotic_economic_model_regulated_mixed_economy_desc:0 "Частный и кооперативный сектор под государственными рамками. Гибче, но дороже в управлении."
 fotic_economic_model_social_market:0 "Социально-рыночная экономика"
 fotic_economic_model_social_market_desc:0 "Рынок при сильных социальных гарантиях. Стабильно и эффективно, но слабее военная мобилизация."
 fotic_economic_model_market_liberalisation:0 "Рыночная либерализация"
 fotic_economic_model_market_liberalisation_desc:0 "Резкое снятие ограничений: краткосрочный шок и удар по стабильности ради долгой перестройки."
 fotic_economic_model_state_capitalism:0 "Государственный капитализм"
 fotic_economic_model_state_capitalism_desc:0 "Рынок под жёстким государственным управлением, стратегические отрасли у центра."

 fotic_ownership_state_dominance:0 "Государственная собственность"
 fotic_ownership_state_dominance_desc:0 "Прямой контроль и мобилизация ресурсов ценой гражданской гибкости."
 fotic_ownership_cooperative_sector:0 "Кооперативный сектор"
 fotic_ownership_cooperative_sector_desc:0 "Кооперативы улучшают снабжение, но растёт серая экономика и слабеет контроль."
 fotic_ownership_mixed_property:0 "Смешанная собственность"
 fotic_ownership_mixed_property_desc:0 "Сбалансированный вариант без сильных бонусов и без жёсткой мобилизации."
 fotic_ownership_private_property_protected:0 "Защищённая частная собственность"
 fotic_ownership_private_property_protected_desc:0 "Инвестиции и гражданское строительство ценой прямого контроля государства."
 fotic_ownership_strategic_state_sector:0 "Стратегический госсектор"
 fotic_ownership_strategic_state_sector_desc:0 "Государство удерживает оборонку и инфраструктуру. Военная промышленность сильна, но дорога в ПП."
 fotic_ownership_crony_privatisation:0 "Номенклатурная приватизация"
 fotic_ownership_crony_privatisation_desc:0 "Краткосрочный выигрыш ценой стабильности и коррупции. Только по особому решению."

 fotic_finance_state_credit_monopoly:0 "Государственная кредитная монополия"
 fotic_finance_state_credit_monopoly_desc:0 "Полный контроль кредитования и мобилизационная устойчивость ценой торговли и гибкости."
 fotic_finance_dual_track:0 "Двухконтурная финансовая система"
 fotic_finance_dual_track_desc:0 "Переходная гибкость и коммерческие каналы ценой серых схем и сложности."
 fotic_finance_regulated_banking:0 "Регулируемый банковский сектор"
 fotic_finance_regulated_banking_desc:0 "Гражданская эффективность и торговля при умеренной нагрузке на ПП."
 fotic_finance_independent_central_bank:0 "Независимый центральный банк"
 fotic_finance_independent_central_bank_desc:0 "Финансовая устойчивость и долгая стабильность ценой прямого государственного контроля."
 fotic_finance_capital_controls:0 "Жёсткий контроль капитала"
 fotic_finance_capital_controls_desc:0 "Защита от вывода средств и устойчивость в кризисе ценой торговли и инвестиций."
 fotic_finance_emergency_monetary_regime:0 "Чрезвычайный денежный режим"
 fotic_finance_emergency_monetary_regime_desc:0 "Краткосрочная стабилизация ценой ПП и долгого экономического штрафа. Только в кризис."

 fotic_tax_centralised_extraction:0 "Централизованные изъятия"
 fotic_tax_centralised_extraction_desc:0 "Ресурсы стекаются в центр, растёт мобилизационный потенциал — но страдает гражданская экономика."
 fotic_tax_progressive:0 "Прогрессивное налогообложение"
 fotic_tax_progressive_desc:0 "Стабильность и социальные гарантии ценой нагрузки на капитал и инвестиции."
 fotic_tax_balanced:0 "Сбалансированная налоговая система"
 fotic_tax_balanced_desc:0 "Нейтральный устойчивый вариант без сильных бонусов."
 fotic_tax_low_tax_competition:0 "Налоговая конкуренция"
 fotic_tax_low_tax_competition_desc:0 "Инвестиции и строительство ценой государственных ресурсов и социальной устойчивости."
 fotic_tax_indirect_heavy:0 "Опора на косвенные налоги"
 fotic_tax_indirect_heavy_desc:0 "Проще сбор и больше ресурсов центру ценой стабильности."
 fotic_tax_emergency_levies:0 "Чрезвычайные сборы"
 fotic_tax_emergency_levies_desc:0 "Краткосрочный ресурс ценой стабильности и ПП. Только в кризис."

 fotic_trade_state_monopoly:0 "Госмонополия внешней торговли"
 fotic_trade_state_monopoly_desc:0 "Контроль импорта и удержание стратегических ресурсов ценой торговой эффективности."
 fotic_trade_controlled:0 "Контролируемая внешняя торговля"
 fotic_trade_controlled_desc:0 "Сбалансированный вариант: умеренный контроль без сильных бонусов."
 fotic_trade_protectionism:0 "Протекционизм"
 fotic_trade_protectionism_desc:0 "Защита внутреннего производства ценой внешней торговли и стоимости импорта."
 fotic_trade_managed_opening:0 "Управляемая открытость"
 fotic_trade_managed_opening_desc:0 "Торговля и гражданский рост при уязвимости к внешним кризисам."
 fotic_trade_free_trade:0 "Свободная торговля"
 fotic_trade_free_trade_desc:0 "Торговая эффективность и производительность ценой удержания ресурсов и внешней зависимости."
 fotic_trade_sanctions_evasion:0 "Обход ограничений"
 fotic_trade_sanctions_evasion_desc:0 "Доступ к импорту под санкциями ценой коррупции и дипломатии. Только по особому решению."

 fotic_social_universal_state_welfare:0 "Универсальные государственные гарантии"
 fotic_social_universal_state_welfare_desc:0 "Стабильность и поддержка населения ценой потребительской нагрузки и гибкости."
 fotic_social_broad_guarantees:0 "Широкие социальные гарантии"
 fotic_social_broad_guarantees_desc:0 "Умеренная стабильность и поддержка при умеренной нагрузке на государство."
 fotic_social_targeted_support:0 "Адресная поддержка"
 fotic_social_targeted_support_desc:0 "Сбалансированная нагрузка и гибкая экономика ценой массовой поддержки."
 fotic_social_minimal_safety_net:0 "Минимальная социальная защита"
 fotic_social_minimal_safety_net_desc:0 "Гражданская эффективность и строительство ценой стабильности и уличного спокойствия."
 fotic_social_rationed_welfare:0 "Нормированное снабжение"
 fotic_social_rationed_welfare_desc:0 "Краткосрочный контроль кризиса ценой чёрного рынка и раздражения. Только в кризис."

 fotic_liberties_party_state_censorship:0 "Партийно-государственная цензура"
 fotic_liberties_party_state_censorship_desc:0 "Контроль режима и партийная дисциплина ценой долгого ПП и исследовательской гибкости."
 fotic_liberties_controlled_public_sphere:0 "Контролируемое публичное пространство"
 fotic_liberties_controlled_public_sphere_desc:0 "Стабильность и управляемость ценой темпа реформ и открытости."
 fotic_liberties_limited_pluralism:0 "Ограниченный плюрализм"
 fotic_liberties_limited_pluralism_desc:0 "Реформаторское влияние и ПП ценой партийной дисциплины и риска нестабильности."
 fotic_liberties_protected_rights:0 "Защищённые гражданские свободы"
 fotic_liberties_protected_rights_desc:0 "Долгая стабильность и дипломатические плюсы ценой быстрого подавления кризиса."
 fotic_liberties_emergency_restrictions:0 "Чрезвычайные ограничения"
 fotic_liberties_emergency_restrictions_desc:0 "Подавление кризиса ценой легитимности и реформаторского влияния. Только в кризис."

 fotic_security_administrative_control:0 "Административный контроль"
 fotic_security_administrative_control_desc:0 "Базовая управляемость, но ограниченная эффективность при крупном кризисе."
 fotic_security_restricted_public_space:0 "Ограниченное публичное пространство"
 fotic_security_restricted_public_space_desc:0 "Подавление беспорядков и влияние силовиков ценой открытости и реформ."
 fotic_security_community_policing:0 "Гражданская полиция"
 fotic_security_community_policing_desc:0 "Стабильность и долгая легитимность ценой чрезвычайного подавления и контроля аппарата."
 fotic_security_liberalised_public_space:0 "Либерализованное публичное пространство"
 fotic_security_liberalised_public_space_desc:0 "Открытость и реформаторское влияние ценой управляемости и риска митингов при дефиците."
 fotic_security_emergency_measures:0 "Чрезвычайные меры безопасности"
 fotic_security_emergency_measures_desc:0 "Сильное подавление и влияние силовиков ценой легитимности и риска чрезвычайного сценария. Только в кризис."

 fotic_posture_defensive_deterrence:0 "Оборонительное сдерживание"
 fotic_posture_defensive_deterrence_desc:0 "Оборона и устойчивость ценой наступательного темпа."
 fotic_posture_expeditionary:0 "Экспедиционный потенциал"
 fotic_posture_expeditionary_desc:0 "Действия за рубежом ценой содержания и ПП."
 fotic_posture_internal_stability:0 "Приоритет внутренней стабильности"
 fotic_posture_internal_stability_desc:0 "Подавление беспорядков и защита режима ценой фронтовой эффективности."
 fotic_posture_total_defence:0 "Тотальная оборона"
 fotic_posture_total_defence_desc:0 "Мобилизация и оборона территории ценой гражданской экономики."
 fotic_posture_revisionist:0 "Ревизионистская доктрина"
 fotic_posture_revisionist_desc:0 "Военная поддержка и наступление ценой дипломатии и стабильности. Только по особому решению."

 fotic_army_centralised_general_staff:0 "Централизованный Генштаб"
 fotic_army_centralised_general_staff_desc:0 "Координация и планирование ценой бюрократии и скорости локальной реакции."
 fotic_army_military_districts:0 "Военные округа"
 fotic_army_military_districts_desc:0 "Территориальная устойчивость и локальная мобилизация ценой риска автономизации командования."
 fotic_army_joint_command:0 "Объединённое командование"
 fotic_army_joint_command_desc:0 "Координация родов войск и современная гибкость ценой стоимости реформы."
 fotic_army_political_oversight:0 "Политический надзор"
 fotic_army_political_oversight_desc:0 "Лояльность режима и партийный контроль ценой инициативы командиров и организации."
 fotic_army_fragmented_security_forces:0 "Разделённые силовые структуры"
 fotic_army_fragmented_security_forces_desc:0 "Защита режима от единого переворота ценой боеспособности и координации. Только по особому решению."

